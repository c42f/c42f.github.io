# Travis CI pelican deploy guide:
# https://zonca.github.io/2013/09/automatically-build-pelican-and-publish-to-github-pages.html
branches:
  only:
  - src
language: python
python:
  - 2.7
install:
  - pip install -r requirements.txt
script:
  - make html
notifications:
  email:
    on_success: always
    on_failure: always
env:
  global:
  - secure: ""
# For special logic for cloning submodules on Travis. See
# https://gist.github.com/iedemam/9830045
git:
  submodules: false
# For deploy key setup, see https://github.com/alrra/travis-scripts/blob/master/docs/github-deploy-keys.md
# I used:
# deploykey_enc_key=$(pwgen -s 64)
# ssh-keygen -t rsa -b 4096 -f 'github_deploy_key' -N ''
# openssl aes-256-cbc -k $deploykey_enc_key -in github_deploy_key -out .github_deploy_key.enc
# travis encrypt deploykey_enc_key=$deploykey_enc_key
# [manually add the key above]
before_install:
  - sed -i 's+git@github.com:+https://github.com/+' .gitmodules
  - git submodule update --init --recursive
  - openssl aes-256-cbc -d -k $deploykey_enc_key -in .github_deploy_key.enc -out github_deploy_key
  - chmod 600 github_deploy_key
  - eval $(ssh-agent -s)
  - ssh-add github_deploy_key
  - rm github_deploy_key
after_success: bash deploy.sh
